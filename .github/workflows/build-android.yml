name: Build Android
on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      PLAY_SERVICE_ACCOUNT_JSON: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: oven-sh/setup-bun@v2

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Install dependencies
        run: bun install

      - name: Prebuild Android
        run: bun expo prebuild --platform android
        working-directory: apps/mobile
        env:
          EXPO_NO_DOTENV: 1

      - name: Build APK
        run: cd android && ./gradlew assembleRelease
        working-directory: apps/mobile

      - name: Build AAB
        run: cd android && ./gradlew bundleRelease
        working-directory: apps/mobile

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release-apk-${{ github.event.release.tag_name }}
          path: apps/mobile/android/app/build/outputs/apk/release/*.apk

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release-aab-${{ github.event.release.tag_name }}
          path: apps/mobile/android/app/build/outputs/bundle/release/*.aab

      - name: Upload to Google Play (internal track)
        if: env.PLAY_SERVICE_ACCOUNT_JSON != ''
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: com.pfnapp.univpn
          releaseFiles: apps/mobile/android/app/build/outputs/bundle/release/*.aab
          releaseName: ${{ github.event.release.tag_name }}
          tracks: internal
          status: completed

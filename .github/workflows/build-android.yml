name: Build Android
on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      PLAY_SERVICE_ACCOUNT_JSON: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}
      KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 22
      - uses: oven-sh/setup-bun@v2
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17

      - run: bun install

      - name: Prebuild Android
        run: bun expo prebuild --platform android
        working-directory: apps/mobile
        env:
          EXPO_NO_DOTENV: 1

      - name: Setup release signing
        if: env.KEYSTORE_BASE64 != ''
        shell: bash
        env:
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_STORE_PASSWORD: ${{ secrets.KEY_STORE_PASSWORD }}
          KEY_KEY_PASSWORD: ${{ secrets.KEY_KEY_PASSWORD }}
        run: |
          cd apps/mobile
          echo "$KEYSTORE_BASE64" | base64 -d > android/app/my-upload-key.keystore

          # ensure trailing newline before appending
          echo "" >> android/gradle.properties
          cat >> android/gradle.properties << EOSIGN
          MYAPP_UPLOAD_STORE_FILE=my-upload-key.keystore
          MYAPP_UPLOAD_KEY_ALIAS=$KEY_ALIAS
          MYAPP_UPLOAD_STORE_PASSWORD=$KEY_STORE_PASSWORD
          MYAPP_UPLOAD_KEY_PASSWORD=$KEY_KEY_PASSWORD
          EOSIGN

          python3 << 'PYSIGN'
          with open('android/app/build.gradle') as f:
              c = f.read()

          release = (
              "\n        release {"
              "\n            storeFile file(MYAPP_UPLOAD_STORE_FILE)"
              "\n            storePassword MYAPP_UPLOAD_STORE_PASSWORD"
              "\n            keyAlias MYAPP_UPLOAD_KEY_ALIAS"
              "\n            keyPassword MYAPP_UPLOAD_KEY_PASSWORD"
              "\n        }"
          )
          c = c.replace('signingConfigs {', 'signingConfigs {' + release)
          c = c.replace('signingConfig signingConfigs.debug', 'signingConfig signingConfigs.release', 1)

          with open('android/app/build.gradle', 'w') as f:
              f.write(c)
          PYSIGN

      - name: Build APK + AAB
        run: cd android && ./gradlew assembleRelease bundleRelease
        working-directory: apps/mobile

      - uses: actions/upload-artifact@v7
        with:
          name: app-release-apk-${{ github.event.release.tag_name }}
          path: apps/mobile/android/app/build/outputs/apk/release/*.apk

      - uses: actions/upload-artifact@v7
        with:
          name: app-release-aab-${{ github.event.release.tag_name }}
          path: apps/mobile/android/app/build/outputs/bundle/release/*.aab

      - name: Upload to Google Play (internal track)
        if: env.PLAY_SERVICE_ACCOUNT_JSON != ''
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: com.pfnapp.univpn
          releaseFiles: apps/mobile/android/app/build/outputs/bundle/release/*.aab
          releaseName: ${{ github.event.release.tag_name }}
          tracks: internal
          status: completed

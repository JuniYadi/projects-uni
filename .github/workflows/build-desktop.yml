name: Build Desktop

on:
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Compile wg-helper
        run: bun build --compile ../../packages/vpn-platform/src/wg-helper.ts --outfile resources/wg-helper.exe
        working-directory: apps/desktop

      - name: Build desktop app
        env:
          UNIVPN_API_BASE_URL: ${{ secrets.EXPO_PUBLIC_API_BASE_URL }}
        run: |
          cd apps/desktop
          bun run build

      - name: Package with electron-builder
        env:
          UNIVPN_API_BASE_URL: ${{ secrets.EXPO_PUBLIC_API_BASE_URL }}
        run: |
          cd apps/desktop
          bun run dist

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: univpn-desktop-windows
          path: apps/desktop/dist/*.exe
          if-no-files-found: error

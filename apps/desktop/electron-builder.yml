appId: com.univpn.desktop
productName: UniVPN
# ponytail: no code signing for MVP; Windows Defender may warn
copyright: Copyright © 2026 UniVPN
directories:
  output: dist
  buildResources: build-resources
files:
  - out/**/*
  - package.json
extraResources:
  # Compiled wg-helper for Windows WireGuard FFI (built via bun build --compile)
  - from: resources/wg-helper.exe
    to: wg-helper.exe
  # Windows WireGuard DLLs (place DLLs here before building for real tunnel)
  - from: resources/win
    to: resources/win
    filter:
      - '**/*'
win:
  target:
    - portable
  artifactName: 'UniVPN-${version}-${arch}.${ext}'
nsis:
  oneClick: true
  artifactName: 'UniVPN-Setup-${version}-${arch}.${ext}'
mac:
  target:
    - dmg
    - zip
  category: public.app-category.utilities
  hardenedRuntime: true
  entitlements: build-resources/entitlements.mac.plist
  entitlementsInherit: build-resources/entitlements.mac.plist
